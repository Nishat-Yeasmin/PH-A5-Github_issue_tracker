<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>
  <nav class="md:flex justify-between items-center bg-white shadow-sm mx-auto py-5 sm:gird grid-cols-1">
        <section class="logo-content lg:flex gap-2 sm:grid grid-cols-1 items-center pl-20">
            <img class="w-9" src="assets/github-logo.png" alt="">
            <h2>GitHub Issues Tracker</h2>
        </section>
            <section class="flex pr-20">
      <div>
        <label class="input validator join-item">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
          <input id="input-search"  type="search" placeholder="Search issues..." required />
        </label>
      </div>
    
      <button id="btn-search" class="btn btn-active btn-primary">+ New issues</button>
            </section>
  </nav>
  <header class="w-11/12 mt-10 mx-auto h-18 mb-4 bg-white shadow-sm">
    <section class="flex gap-2 pl-4 pt-4">
        <button onclick="toggleStyle('All-filter-btn');loadIssues()" id="All-filter-btn" class="btn btn-primary w-[120px]">All</button>

        <button onclick="toggleStyle('open-filter-btn');loadOpenIssues()" id="open-filter-btn" class="btn btn-outline btn-primary w-[120px]">Open</button>

        <button onclick="toggleStyle('closed-filter-btn');loadClosedIssues()" id="closed-filter-btn" class="btn btn-outline btn-primary w-[120px]">Closed</button>
    </section>
  </header>

  <section class="w-11/12 mx-auto shadow-sm flex justify-between">
    <div class="card-header flex gap-3 pl-2 items-center h-16">
        <img src="assets/Group 1.png" alt="">
        <div class="count">
            <h2 class="font-semibold text-[20px] text-[#1F2937]">50 Issues</h2>
            <p class="text-[16px] text-[#64748b]">Track and manage your project issues</p>
        </div>
    </div>
    <div class="tag flex gap-2 pr-2">
        <div class="flex gap-1 items-center">
            <img class="w-3 h-3" src="assets/Ellipse 2.png" alt="">
            <p class="font-medium text-[#1F2937] text-[16px]">Open</p>
        </div>
        <div class="flex gap-1 items-center">
            <img class="w-3 h-3" src="assets/Ellipse 2 (1).png" alt="">
            <p class="font-medium text-[#1F2937] text-[16px]">Closed</p>
        </div>
    </div>
  </section>

  <section id="spinner" class="flex justify-center items-center py-10 hidden">
    <span class="loading loading-dots loading-lg"></span>
  </section>

  <section id="card-container" class="lg:grid grid-cols-4 sm:grid grid-cols-1 md:grid grid-cols-2gap-4 w-11/12 mx-auto my-6 ">
  </section>

  
<img src="assets/github-logo.png" alt="">

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modal-content"></div>
    <div class="modal-action">
      <form method="dialog">
       
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

  <script src="script.js"></script>
</body>
</html>
