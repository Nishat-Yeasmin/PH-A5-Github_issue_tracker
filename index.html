<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

    <header class=" min-h-screen max-w-md bg-base-100 mx-auto shadow-2xl m-10 pt-20">
        <div class="title mx-auto text-center">
            <img class="mx-auto" src="assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl text-[#1F2937] mt-2">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-[#64748b]">Sign in to manage your issues</p>
        </div>
        <div class="input-data px-4 py-7">

            <fieldset class="fieldset">
       <legend class="fieldset-legend">Username</legend>
       <input id="Username" type="text" class="input w-full" placeholder="Enter Username" />
      
     </fieldset>
            <fieldset class="fieldset">
       <legend class="fieldset-legend">Password</legend>
       <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
     </fieldset>
     <button onclick="login()" class="btn btn-active btn-primary w-full mt-6 ">Sign In</button>
        </div>
        <div class="flex items-center gap-3 my-6 px-4">
  <hr class="flex-grow border-gray-300">
  <span class="text-gray-500 text-sm">OR</span>
  <hr class="flex-grow border-gray-300">
</div>

<div class="demo text-center pb-8">
    <p class="text-[14px] text-[#64748b] mb-2">Demo Credentials:</p>
    <div class="example rounded bg-slate-100 w-11/12 mx-auto py-6 text-[#1F2937]">
        <h3><span class="font-bold">Username:</span> admin</h3>
        <h3><span class="font-bold">Password:</span> admin123</h3>
    </div>
</div>
    </header>
    <script src="script.js"></script>
</body>
</html>
